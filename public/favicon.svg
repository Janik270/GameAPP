<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1b4b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#a855f7" flood-opacity="0.7"/>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>
  <!-- Subtle inner glow ring -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.3"/>

  <!-- Gamepad body -->
  <g filter="url(#shadow)">
    <!-- Main body shape -->
    <rect x="110" y="195" width="292" height="160" rx="70" ry="70" fill="url(#glow)" opacity="0.95"/>
    <!-- Left grip -->
    <ellipse cx="160" cy="330" rx="60" ry="50" fill="url(#glow)" opacity="0.95"/>
    <!-- Right grip -->
    <ellipse cx="352" cy="330" rx="60" ry="50" fill="url(#glow)" opacity="0.95"/>

    <!-- D-pad (left side) -->
    <!-- Horizontal bar -->
    <rect x="148" y="248" width="52" height="18" rx="5" fill="white" opacity="0.9"/>
    <!-- Vertical bar -->
    <rect x="165" y="231" width="18" height="52" rx="5" fill="white" opacity="0.9"/>

    <!-- Buttons (right side) -->
    <!-- Circle button (top) -->
    <circle cx="328" cy="237" r="12" fill="white" opacity="0.9"/>
    <!-- Cross button (bottom) -->
    <circle cx="328" cy="273" r="12" fill="white" opacity="0.9"/>
    <!-- Square button (left) -->
    <circle cx="310" cy="255" r="12" fill="white" opacity="0.9"/>
    <!-- Triangle button (right) -->
    <circle cx="346" cy="255" r="12" fill="white" opacity="0.9"/>

    <!-- Center connector bar -->
    <rect x="210" y="220" width="92" height="14" rx="7" fill="white" opacity="0.4"/>

    <!-- Analog sticks -->
    <circle cx="220" cy="295" r="18" fill="white" opacity="0.25"/>
    <circle cx="220" cy="295" r="10" fill="white" opacity="0.6"/>
    <circle cx="300" cy="295" r="18" fill="white" opacity="0.25"/>
    <circle cx="300" cy="295" r="10" fill="white" opacity="0.6"/>
  </g>
</svg>
